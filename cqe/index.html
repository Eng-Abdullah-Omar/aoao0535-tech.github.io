<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b3a53">
<meta name="description" content="Comprehensive bilingual Arabic-English ASQ CQE exam preparation course">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ASQ CQE Academy | الأكاديمية ثنائية اللغة</title>
<link rel="stylesheet" href="v2/styles.css?v=20260722-10">
<style>
.library-home{display:inline-flex;align-items:center;gap:7px;height:42px;padding:0 13px;border:1px solid rgba(255,255,255,.3);border-radius:13px;color:#fff;text-decoration:none;font-size:14px;font-weight:800;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);white-space:nowrap;transition:.18s ease}.library-home:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}.library-home:focus-visible{outline:3px solid #f4c861;outline-offset:2px}@media(max-width:620px){.library-home{width:42px;padding:0;justify-content:center}.library-home span{display:none}}
</style>
</head>
<body>
<header class="topbar">
  <a class="brand" href="#home" data-tab="home">
    <span class="logo">CQE</span>
    <span><strong id="brandTitle"></strong><small id="brandSubtitle"></small></span>
  </a>
  <div class="top-actions">
    <a class="library-home" href="https://eng-abdullah-omar.github.io/aoao0535-tech.github.io/" aria-label="العودة إلى صفحة جميع الدورات" title="جميع الدورات / All Courses">⌂ <span>جميع الدورات</span></a>
    <button id="themeBtn" class="icon-btn" type="button" aria-label="Theme">◐</button>
    <button id="langBtn" class="lang-btn" type="button"></button>
  </div>
</header>
<nav class="main-nav" id="mainNav"></nav>

<main class="shell">
  <section id="home" class="page active">
    <div class="notice">جارٍ تحميل محتوى الدورة…<br>Loading course content…</div>
  </section>

  <section id="lessons" class="page">
    <div class="lesson-layout">
      <aside class="lesson-sidebar">
        <div class="search-wrap">
          <input id="lessonSearch" type="search" autocomplete="off">
        </div>
        <div id="domainList" class="domain-list"></div>
        <div id="lessonList" class="lesson-list"></div>
      </aside>
      <article id="lessonView" class="lesson-view"></article>
    </div>
  </section>

  <section id="tools" class="page"></section>
  <section id="cards" class="page"></section>
  <section id="practice" class="page"></section>
  <section id="references" class="page"></section>
</main>

<div id="toast" class="toast" aria-live="polite"></div>

<noscript>
  <div class="notice">يلزم تفعيل JavaScript لفتح الدورة.<br>JavaScript is required to open the course.</div>
</noscript>
<script src="v2/app-unpacked.js?v=20260722-10"></script>
</body>
</html>
