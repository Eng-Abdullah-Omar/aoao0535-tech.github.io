name: Unpack CQE course

on:
  push:
    paths:
      - '.github/workflows/unpack-cqe.yml'
      - 'cqe/v2/c*.js'
      - 'cqe/v2/p*.js'
      - 'cqe/v2/q*.js'
  pull_request:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild plain CQE application
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          import pathlib
          import re
          import subprocess
          import sys
          import traceback

          root = pathlib.Path('.')
          source_dir = root / 'cqe' / 'v2'
          grouped_files = [
              'c00.js','c01.js','c02.js','c03.js','c04.js','c05.js',
              'c06.js','c07.js','c08.js','c09.js','c10.js','c11.js',
              'p12.js','p14.js','q16.js','q20.js','q24.js','q28.js',
              'q32.js','q36.js'
          ]
          pattern = re.compile(r'window\.CQE_CHUNKS\[(\d+)\]="([A-Za-z0-9+/=]+)";')
          diagnostic = {'status': 'FAILED', 'attempts': []}

          def read_chunks(path):
              text = path.read_text(encoding='utf-8')
              return [(int(i), value) for i, value in pattern.findall(text)]

          def test_candidate(name, packed):
              record = {
                  'name': name,
                  'characters': len(packed),
                  'mod4': len(packed) % 4,
                  'equals_count': packed.count('='),
                  'first_equals': packed.find('='),
              }
              try:
                  compressed = base64.b64decode(packed, validate=True)
                  record['compressed_bytes'] = len(compressed)
                  code_bytes = gzip.decompress(compressed)
                  code = code_bytes.decode('utf-8')
                  temp = source_dir / '_candidate-check.js'
                  temp.write_text(code, encoding='utf-8')
                  check = subprocess.run(
                      ['node', '--check', str(temp)],
                      capture_output=True,
                      text=True
                  )
                  temp.unlink(missing_ok=True)
                  if check.returncode != 0:
                      raise RuntimeError(check.stderr.strip() or 'node --check failed')
                  record['status'] = 'SUCCESS'
                  record['javascript_bytes'] = len(code_bytes)
                  return record, code
              except Exception as exc:
                  record['status'] = 'FAILED'
                  record['error_type'] = type(exc).__name__
                  record['error'] = str(exc)
                  return record, None

          try:
              chunks = {}
              sources = {}
              for filename in grouped_files:
                  matches = read_chunks(source_dir / filename)
                  if not matches:
                      raise RuntimeError(f'No CQE chunks found in {filename}')
                  for index, value in matches:
                      if index in chunks:
                          raise RuntimeError(f'Duplicate chunk {index}: {sources[index]} and {filename}')
                      chunks[index] = value
                      sources[index] = filename

              missing = [i for i in range(37) if i not in chunks]
              if missing:
                  raise RuntimeError(f'Missing grouped chunks: {missing}')

              corrected_matches = read_chunks(source_dir / 'c33.js')
              corrected33 = next((value for index, value in corrected_matches if index == 33), None)
              if not corrected33:
                  raise RuntimeError('Corrected c33.js payload was not found')

              diagnostic['chunk33'] = {
                  'grouped_length': len(chunks[33]),
                  'grouped_prefix': chunks[33][:16],
                  'grouped_suffix': chunks[33][-16:],
                  'corrected_length': len(corrected33),
                  'corrected_prefix': corrected33[:16],
                  'corrected_suffix': corrected33[-16:],
              }

              candidates = {
                  'grouped_original': ''.join(chunks[i] for i in range(37)),
                  'corrected_chunk33': ''.join(
                      corrected33 if i == 33 else chunks[i]
                      for i in range(37)
                  ),
              }

              selected_name = None
              selected_code = None
              for name, packed in candidates.items():
                  record, code = test_candidate(name, packed)
                  diagnostic['attempts'].append(record)
                  if code is not None and selected_code is None:
                      selected_name = name
                      selected_code = code

              if selected_code is None:
                  raise RuntimeError('Neither the grouped nor corrected chunk-33 payload is valid')

              output = source_dir / 'app-unpacked.js'
              output.write_text(selected_code + '\n//# sourceURL=cqe-course-app.js\n', encoding='utf-8')

              index_path = root / 'cqe' / 'index.html'
              html = index_path.read_text(encoding='utf-8')
              html = re.sub(
                  r'<script src="v2/(?:loader40|app-unpacked)\.js\?v=[^"]+"></script>',
                  '<script src="v2/app-unpacked.js?v=20260722-7"></script>',
                  html
              )
              html = re.sub(r'v2/styles\.css\?v=[^"]+', 'v2/styles.css?v=20260722-7', html)
              index_path.write_text(html, encoding='utf-8')

              diagnostic['status'] = 'SUCCESS'
              diagnostic['selected_candidate'] = selected_name
              diagnostic['output'] = str(output)
          except Exception as exc:
              diagnostic['status'] = 'FAILED'
              diagnostic['error_type'] = type(exc).__name__
              diagnostic['error'] = str(exc)
              diagnostic['traceback'] = traceback.format_exc()

          (root / 'cqe' / 'unpack-diagnostic.json').write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )

          if diagnostic['status'] != 'SUCCESS':
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              sys.exit(1)
          PY

      - name: Commit rebuilt application
        if: always() && github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A cqe
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build stable unpacked CQE application"
          git push
