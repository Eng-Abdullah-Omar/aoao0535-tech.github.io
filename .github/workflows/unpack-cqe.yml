name: Unpack CQE course

on:
  push:
    paths:
      - '.github/workflows/unpack-cqe.yml'
      - 'cqe/v2/c*.js'
      - 'cqe/v2/p*.js'
      - 'cqe/v2/q*.js'
  pull_request:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild plain CQE application
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          import pathlib
          import re
          import struct
          import subprocess
          import sys
          import traceback
          import zlib

          root = pathlib.Path('.')
          source_dir = root / 'cqe' / 'v2'
          grouped_files = [
              'c00.js','c01.js','c02.js','c03.js','c04.js','c05.js',
              'c06.js','c07.js','c08.js','c09.js','c10.js','c11.js',
              'p12.js','p14.js','q16.js','q20.js','q24.js','q28.js',
              'q32.js','q36.js'
          ]
          pattern = re.compile(r'window\.CQE_CHUNKS\[(\d+)\]="([A-Za-z0-9+/=]+)";')
          diagnostic = {'status': 'FAILED'}

          try:
              chunks = {}
              sources = {}
              for filename in grouped_files:
                  text = (source_dir / filename).read_text(encoding='utf-8')
                  matches = [(int(i), value) for i, value in pattern.findall(text)]
                  if not matches:
                      raise RuntimeError(f'No CQE chunks found in {filename}')
                  for index, value in matches:
                      if index in chunks:
                          raise RuntimeError(f'Duplicate chunk {index}: {sources[index]} and {filename}')
                      chunks[index] = value
                      sources[index] = filename

              missing = [i for i in range(37) if i not in chunks]
              if missing:
                  raise RuntimeError(f'Missing grouped chunks: {missing}')

              packed = ''.join(chunks[i] for i in range(37))
              diagnostic['packed_characters'] = len(packed)
              diagnostic['packed_mod4'] = len(packed) % 4
              diagnostic['packed_suffix'] = packed[-20:]

              # The uploaded package lost the final three Base64 characters.
              # Its remaining prefix still decodes to a complete gzip stream except
              # for the final two bytes of the 8-byte gzip trailer (ISIZE high bytes).
              if not packed.endswith('=') or len(packed) % 4 != 1:
                  raise RuntimeError('CQE payload does not match the expected recoverable truncation')

              encoded_prefix = packed[:-1]
              if len(encoded_prefix) % 4 != 0:
                  raise RuntimeError('CQE Base64 prefix is not aligned')

              truncated_gzip = base64.b64decode(encoded_prefix, validate=True)
              inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
              code_bytes = inflater.decompress(truncated_gzip)
              code_bytes += inflater.flush()

              if not code_bytes:
                  raise RuntimeError('No JavaScript could be recovered from the truncated gzip stream')

              expected_crc = zlib.crc32(code_bytes) & 0xffffffff
              expected_size = len(code_bytes) & 0xffffffff
              expected_trailer = struct.pack('<II', expected_crc, expected_size)
              existing_trailer_prefix = truncated_gzip[-6:]

              diagnostic['truncated_gzip_bytes'] = len(truncated_gzip)
              diagnostic['javascript_bytes_recovered'] = len(code_bytes)
              diagnostic['gzip_eof_before_repair'] = inflater.eof
              diagnostic['existing_trailer_prefix_hex'] = existing_trailer_prefix.hex()
              diagnostic['expected_trailer_hex'] = expected_trailer.hex()

              if existing_trailer_prefix != expected_trailer[:6]:
                  raise RuntimeError(
                      'The recovered gzip trailer does not match CRC/size; payload is damaged before its final two bytes'
                  )

              repaired_gzip = truncated_gzip + expected_trailer[6:]
              verified_code_bytes = gzip.decompress(repaired_gzip)
              if verified_code_bytes != code_bytes:
                  raise RuntimeError('Repaired CQE payload verification mismatch')

              code = verified_code_bytes.decode('utf-8')
              output = source_dir / 'app-unpacked.js'
              output.write_text(code + '\n//# sourceURL=cqe-course-app.js\n', encoding='utf-8')

              check = subprocess.run(
                  ['node', '--check', str(output)],
                  capture_output=True,
                  text=True
              )
              if check.returncode != 0:
                  raise RuntimeError(check.stderr.strip() or 'node --check failed')

              index_path = root / 'cqe' / 'index.html'
              html = index_path.read_text(encoding='utf-8')
              html = re.sub(
                  r'<script src="v2/(?:loader40|app-unpacked)\.js\?v=[^"]+"></script>',
                  '<script src="v2/app-unpacked.js?v=20260722-8"></script>',
                  html
              )
              html = re.sub(r'v2/styles\.css\?v=[^"]+', 'v2/styles.css?v=20260722-8', html)
              index_path.write_text(html, encoding='utf-8')

              diagnostic['status'] = 'SUCCESS'
              diagnostic['repair'] = 'Restored the final two gzip trailer bytes from verified CRC32 and ISIZE'
              diagnostic['repaired_gzip_bytes'] = len(repaired_gzip)
              diagnostic['output'] = str(output)
          except Exception as exc:
              diagnostic['status'] = 'FAILED'
              diagnostic['error_type'] = type(exc).__name__
              diagnostic['error'] = str(exc)
              diagnostic['traceback'] = traceback.format_exc()

          (root / 'cqe' / 'unpack-diagnostic.json').write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )

          if diagnostic['status'] != 'SUCCESS':
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              sys.exit(1)
          PY

      - name: Commit rebuilt application
        if: always() && github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A cqe
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Repair and unpack CQE application"
          git push
