name: Unpack CQE course

on:
  push:
    paths:
      - '.github/workflows/unpack-cqe.yml'
      - 'cqe/v2/c*.js'
      - 'cqe/v2/p*.js'
      - 'cqe/v2/q*.js'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild plain CQE application
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          import pathlib
          import re
          import subprocess
          import sys
          import traceback

          root = pathlib.Path('.')
          source_dir = root / 'cqe' / 'v2'
          files = [
              'c00.js','c01.js','c02.js','c03.js','c04.js','c05.js',
              'c06.js','c07.js','c08.js','c09.js','c10.js','c11.js',
              'p12.js','p14.js','q16.js','q20.js','q24.js','q28.js',
              'q32.js','q36.js'
          ]
          diagnostic = {'status': 'FAILED'}

          try:
              chunks = {}
              pattern = re.compile(r'window\.CQE_CHUNKS\[(\d+)\]="([A-Za-z0-9+/=]+)";')
              for name in files:
                  text = (source_dir / name).read_text(encoding='utf-8')
                  matches = pattern.findall(text)
                  if not matches:
                      raise RuntimeError(f'No CQE chunks found in {name}')
                  for index, value in matches:
                      index = int(index)
                      if index in chunks:
                          raise RuntimeError(f'Duplicate CQE chunk {index} in {name}')
                      chunks[index] = value

              missing = [i for i in range(40) if i not in chunks]
              extra = sorted(i for i in chunks if i not in range(40))
              if missing or extra:
                  raise RuntimeError(f'Missing chunks={missing}; extra chunks={extra}')

              packed = ''.join(chunks[i] for i in range(40))
              compressed = base64.b64decode(packed, validate=True)
              code_bytes = gzip.decompress(compressed)
              code = code_bytes.decode('utf-8')

              output = source_dir / 'app-unpacked.js'
              output.write_text(code + '\n//# sourceURL=cqe-course-app.js\n', encoding='utf-8')

              subprocess.run(['node', '--check', str(output)], check=True)

              index_path = root / 'cqe' / 'index.html'
              html = index_path.read_text(encoding='utf-8')
              html = re.sub(
                  r'<script src="v2/loader40\.js\?v=[^"]+"></script>',
                  '<script src="v2/app-unpacked.js?v=20260722-3"></script>',
                  html
              )
              html = html.replace('v2/styles.css?v=20260722-2', 'v2/styles.css?v=20260722-3')
              index_path.write_text(html, encoding='utf-8')

              diagnostic = {
                  'status': 'SUCCESS',
                  'chunks': len(chunks),
                  'base64_characters': len(packed),
                  'compressed_bytes': len(compressed),
                  'javascript_bytes': len(code_bytes),
                  'output': str(output),
              }
          except Exception as exc:
              diagnostic = {
                  'status': 'FAILED',
                  'error_type': type(exc).__name__,
                  'error': str(exc),
                  'traceback': traceback.format_exc(),
              }

          (root / 'cqe' / 'unpack-diagnostic.json').write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )

          if diagnostic['status'] != 'SUCCESS':
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              sys.exit(1)
          PY

      - name: Commit rebuilt application
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cqe/v2/app-unpacked.js cqe/index.html cqe/unpack-diagnostic.json 2>/dev/null || true
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build stable unpacked CQE application"
          git push
