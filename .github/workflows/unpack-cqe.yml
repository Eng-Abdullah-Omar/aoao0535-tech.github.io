name: Unpack CQE course

on:
  push:
    paths:
      - '.github/workflows/unpack-cqe.yml'
      - 'cqe/v2/c*.js'
      - 'cqe/v2/p*.js'
      - 'cqe/v2/q*.js'
  pull_request:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build stable plain CQE application
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          import pathlib
          import re
          import subprocess
          import sys
          import traceback

          root = pathlib.Path('.')
          source_dir = root / 'cqe' / 'v2'
          pattern = re.compile(r'window\.CQE_CHUNKS\[(\d+)\]="([A-Za-z0-9+/=]+)";')
          diagnostic = {'status': 'FAILED'}

          def parse_file(filename):
              text = (source_dir / filename).read_text(encoding='utf-8')
              return {int(i): value for i, value in pattern.findall(text)}

          try:
              chunks = {}
              sources = {}

              # Chunks 0–31 are valid in the grouped files.
              grouped_files = [
                  'c00.js','c01.js','c02.js','c03.js','c04.js','c05.js',
                  'c06.js','c07.js','c08.js','c09.js','c10.js','c11.js',
                  'p12.js','p14.js','q16.js','q20.js','q24.js','q28.js'
              ]
              for filename in grouped_files:
                  for index, value in parse_file(filename).items():
                      if index > 31:
                          continue
                      if index in chunks:
                          raise RuntimeError(f'Duplicate chunk {index}: {sources[index]} and {filename}')
                      chunks[index] = value
                      sources[index] = filename

              # The later grouped files were stale. Exact corrected files c32–c39
              # contain one coherent Base64/gzip sequence and must be used together.
              for index in range(32, 40):
                  filename = f'c{index}.js'
                  values = parse_file(filename)
                  if index not in values:
                      raise RuntimeError(f'Chunk {index} was not found in {filename}')
                  chunks[index] = values[index]
                  sources[index] = filename

              missing = [i for i in range(40) if i not in chunks]
              if missing:
                  raise RuntimeError(f'Missing chunks: {missing}')

              packed = ''.join(chunks[i] for i in range(40))
              diagnostic['packed_characters'] = len(packed)
              diagnostic['packed_mod4'] = len(packed) % 4
              diagnostic['padding_count'] = packed.count('=')
              diagnostic['padding_position'] = packed.find('=')
              diagnostic['sources'] = sources
              diagnostic['chunk_lengths'] = {str(i): len(chunks[i]) for i in range(40)}

              compressed = base64.b64decode(packed, validate=True)
              code_bytes = gzip.decompress(compressed)
              code = code_bytes.decode('utf-8')

              # The source payload contains two duplicate UI keys named "method".
              # In JavaScript object literals the later label overwrites the earlier
              # instruction array, which caused renderHome() to call .map() on a string.
              replacements = [
                  ("method:['ادرس الوحدة", "methodSteps:['ادرس الوحدة"),
                  ("method:['Study each unit", "methodSteps:['Study each unit"),
                  ("u('method').map", "u('methodSteps').map"),
              ]
              for old, new in replacements:
                  occurrences = code.count(old)
                  if occurrences != 1:
                      raise RuntimeError(
                          f'Expected exactly one CQE runtime replacement for {old!r}, found {occurrences}'
                      )
                  code = code.replace(old, new, 1)

              output = source_dir / 'app-unpacked.js'
              output.write_text(code + '\n//# sourceURL=cqe-course-app.js\n', encoding='utf-8')

              check = subprocess.run(
                  ['node', '--check', str(output)],
                  capture_output=True,
                  text=True
              )
              diagnostic['node_check_returncode'] = check.returncode
              diagnostic['node_check_stderr'] = check.stderr[-2000:]
              if check.returncode != 0:
                  raise RuntimeError(check.stderr.strip() or 'node --check failed')

              required_markers = [
                  'brandTitle', 'brandSubtitle', 'lessonView',
                  'domainList', 'practice', 'references', 'methodSteps'
              ]
              missing_markers = [marker for marker in required_markers if marker not in code]
              if missing_markers:
                  raise RuntimeError(f'Rebuilt JavaScript is missing markers: {missing_markers}')

              index_path = root / 'cqe' / 'index.html'
              html = index_path.read_text(encoding='utf-8')
              html = re.sub(
                  r'<script src="v2/(?:loader40|app-unpacked)\.js\?v=[^"]+"></script>',
                  '<script src="v2/app-unpacked.js?v=20260722-12"></script>',
                  html
              )
              html = re.sub(r'v2/styles\.css\?v=[^"]+', 'v2/styles.css?v=20260722-12', html)
              index_path.write_text(html, encoding='utf-8')

              diagnostic['status'] = 'SUCCESS'
              diagnostic['compressed_bytes'] = len(compressed)
              diagnostic['javascript_bytes'] = len(code.encode('utf-8'))
              diagnostic['output'] = str(output)
          except Exception as exc:
              diagnostic['status'] = 'FAILED'
              diagnostic['error_type'] = type(exc).__name__
              diagnostic['error'] = str(exc)
              diagnostic['traceback'] = traceback.format_exc()

          (root / 'cqe' / 'unpack-diagnostic.json').write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )

          if diagnostic['status'] != 'SUCCESS':
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              sys.exit(1)
          PY

      - name: Commit rebuilt application
        if: always() && github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A cqe
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build stable CQE app from corrected chunks"
          git push
