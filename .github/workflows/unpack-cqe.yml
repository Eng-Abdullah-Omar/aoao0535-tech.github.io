name: Unpack CQE course

on:
  push:
    paths:
      - '.github/workflows/unpack-cqe.yml'
      - 'cqe/v2/c*.js'
      - 'cqe/v2/p*.js'
      - 'cqe/v2/q*.js'
  pull_request:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild plain CQE application
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          import pathlib
          import re
          import subprocess
          import sys
          import traceback

          root = pathlib.Path('.')
          source_dir = root / 'cqe' / 'v2'
          files = [
              'c00.js','c01.js','c02.js','c03.js','c04.js','c05.js',
              'c06.js','c07.js','c08.js','c09.js','c10.js','c11.js',
              'p12.js','p14.js','q16.js','q20.js','q24.js','q28.js',
              'q32.js','q36.js','c37.js','c38.js','c39.js'
          ]

          chunks = {}
          file_map = {}
          diagnostic = {'status': 'FAILED', 'attempts': []}

          try:
              pattern = re.compile(r'window\.CQE_CHUNKS\[(\d+)\]="([A-Za-z0-9+/=]+)";')
              for name in files:
                  text = (source_dir / name).read_text(encoding='utf-8')
                  matches = pattern.findall(text)
                  if not matches:
                      raise RuntimeError(f'No CQE chunks found in {name}')
                  for index, value in matches:
                      index = int(index)
                      if index in chunks:
                          raise RuntimeError(f'Duplicate CQE chunk {index} in {name} and {file_map[index]}')
                      chunks[index] = value
                      file_map[index] = name

              diagnostic['chunk_meta'] = [
                  {
                      'index': i,
                      'file': file_map.get(i),
                      'length': len(chunks[i]) if i in chunks else None,
                      'mod4': len(chunks[i]) % 4 if i in chunks else None,
                      'equals_count': chunks[i].count('=') if i in chunks else None,
                      'first_equals': chunks[i].find('=') if i in chunks else None,
                      'suffix': chunks[i][-16:] if i in chunks else None,
                  }
                  for i in range(40)
              ]

              candidates = {
                  'legacy_0_36': ''.join(chunks[i] for i in range(37) if i in chunks),
                  'all_0_39': ''.join(chunks[i] for i in range(40) if i in chunks),
                  '0_35_plus_37_39': ''.join(chunks[i] for i in list(range(36)) + [37,38,39] if i in chunks),
              }

              success = None
              success_code = None

              def attempt(name, packed, strip_mid_padding=False):
                  record = {
                      'name': name,
                      'characters': len(packed),
                      'mod4': len(packed) % 4,
                      'equals_count': packed.count('='),
                      'first_equals': packed.find('='),
                  }
                  try:
                      data = packed
                      if strip_mid_padding:
                          data = data.replace('=', '')
                          data += '=' * ((4 - len(data) % 4) % 4)
                      compressed = base64.b64decode(data, validate=True)
                      record['compressed_bytes'] = len(compressed)
                      code_bytes = gzip.decompress(compressed)
                      code = code_bytes.decode('utf-8')
                      temp = source_dir / '_candidate-check.js'
                      temp.write_text(code, encoding='utf-8')
                      subprocess.run(['node', '--check', str(temp)], check=True, capture_output=True, text=True)
                      temp.unlink(missing_ok=True)
                      record['status'] = 'SUCCESS'
                      record['javascript_bytes'] = len(code_bytes)
                      return record, code
                  except Exception as exc:
                      record['status'] = 'FAILED'
                      record['error_type'] = type(exc).__name__
                      record['error'] = str(exc)
                      return record, None

              for name, packed in candidates.items():
                  for strip in (False, True):
                      label = name + ('_strip_padding' if strip else '')
                      record, code = attempt(label, packed, strip)
                      diagnostic['attempts'].append(record)
                      if code is not None and success is None:
                          success = label
                          success_code = code

              if success_code is None:
                  raise RuntimeError('No reconstruction candidate produced valid JavaScript')

              output = source_dir / 'app-unpacked.js'
              output.write_text(success_code + '\n//# sourceURL=cqe-course-app.js\n', encoding='utf-8')

              index_path = root / 'cqe' / 'index.html'
              html = index_path.read_text(encoding='utf-8')
              html = re.sub(
                  r'<script src="v2/loader40\.js\?v=[^"]+"></script>',
                  '<script src="v2/app-unpacked.js?v=20260722-6"></script>',
                  html
              )
              html = re.sub(
                  r'<script src="v2/app-unpacked\.js\?v=[^"]+"></script>',
                  '<script src="v2/app-unpacked.js?v=20260722-6"></script>',
                  html
              )
              html = re.sub(r'v2/styles\.css\?v=[^"]+', 'v2/styles.css?v=20260722-6', html)
              index_path.write_text(html, encoding='utf-8')

              diagnostic['status'] = 'SUCCESS'
              diagnostic['selected_candidate'] = success
              diagnostic['output'] = str(output)
          except Exception as exc:
              diagnostic['status'] = 'FAILED'
              diagnostic['error_type'] = type(exc).__name__
              diagnostic['error'] = str(exc)
              diagnostic['traceback'] = traceback.format_exc()

          (root / 'cqe' / 'unpack-diagnostic.json').write_text(
              json.dumps(diagnostic, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )

          if diagnostic['status'] != 'SUCCESS':
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              sys.exit(1)
          PY

      - name: Commit rebuilt application
        if: always() && github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A cqe
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build stable unpacked CQE application"
          git push
